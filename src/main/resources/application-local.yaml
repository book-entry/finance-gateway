server:
  port: 8080

spring:
  application:
    name: finance-gateway
  cloud:
    config:
      enabled: false
    gateway:
      grpc:
        enabled: false
      routes:
        - id: authentication-service
          uri: http://localhost:8084
          predicates:
            - Path=/authentication/**
          filters:
            - RemoveRequestHeader=Authorization
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/account/**
        #          filters:
        #            - name: FirebaseAuth

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/transaction/**
        #          filters:
        #            - name: FirebaseAuth

        - id: ingestion-service
          uri: http://localhost:8083
          predicates:
            - Path=/ingestion/**
  #          filters:
  #            - name: FirebaseAuth

  # Disable default Spring Security login page
  security:
    user:
      password: disabled

finance:
  gateway:
    internal:
      # Shared secret forwarded as X-Internal-Secret. Must match the value on
      # downstream services running in behind-gateway mode. Generate with:
      # openssl rand -hex 32. Do NOT commit — keep this file gitignored.
      secret: 2d9feb21285aa6cccd32de04a06d487f168aca93b1840090d0b6c2944f491f86

firebase:
  credentials-json: 
  project-id: book-entry-login

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
